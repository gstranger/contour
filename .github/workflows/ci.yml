name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust (fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (warnings as errors)
        run: |
          cargo clippy --workspace --all-targets --all-features -- \
            -D warnings \
            -A clippy::too_many_arguments \
            -A clippy::type_complexity \
            -A clippy::new_without_default \
            -A clippy::question_mark \
            -A clippy::manual_clamp \
            -A clippy::manual_range_contains \
            -A clippy::manual_flatten \
            -A clippy::collapsible_if \
            -A clippy::collapsible_else_if \
            -A clippy::needless_range_loop \
            -A clippy::while_let_loop \
            -A clippy::unnecessary_map_or \
            -A clippy::uninlined_format_args \
            -A clippy::map_entry \
            -A clippy::unwrap_or_default \
            -A clippy::iter_cloned_collect \
            -A clippy::unnecessary_cast \
            -A clippy::derivable_impls \
            -A clippy::excessive_precision \
            -A clippy::doc_lazy_continuation

  core:
    name: Core (contour) Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Run core tests
        run: cargo test -p contour --all-features --verbose

  wasm:
    name: WASM (contour-wasm) Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run wasm-bindgen tests (Node)
        run: ./scripts/test-wasm-node.sh
